<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ok Sound Board</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header>
        <h1>Ok Sound Board</h1>
    </header>
<!--<button style="border-radius: 0%;border:0 solid white; z-index: 2;position: absolute; width: 7%;bottom: 35%; right: 0; height: 10%;opacity: 0.8; background-color: rgb(111, 111, 111);border-top-left-radius: 50%; border-bottom-left-radius: 50%;">></button>
    <button style="border-radius: 0%;border:0 solid white; z-index: 2;position: absolute; width: 7%;bottom: 35%; left: 0; height: 10%;opacity: 0.8; background-color: rgb(111, 111, 111);border-top-right-radius: 50%; border-bottom-right-radius: 50%;">0</button>

    <div class="scheda">
        <div class="continar">
            <button onclick="riproduci('xfile.mp3')"><strong><p>X File</p></strong></button>
            <button onclick="riproduci('spiderman.mp3')"><strong><p>Spiderman</p></strong></button>
        </div>
        <div class="continar">
            <button onclick="riproduci('batman.mp3')"><strong><p>Batman</p></strong></button>
            <button onclick="riproduci()"><strong><p>???</p></strong></button>
        </div>
        <div class="continar">
            <button onclick="riproduci()"><strong><p>???</p></strong></button>
            <button onclick="riproduci()"><strong><p>???</p></strong></button>
        </div>
    </div>

    <script>
        function riproduci(nomeFile) {
            // Crea un nuovo oggetto Audio passando il percorso del file
            const audio = new Audio("audio/"+nomeFile);
            
            // Avvia la riproduzione
            audio.play()
                .then(() => {
                    console.log(`Riproduzione avviata: ${nomeFile}`);
                })
                .catch(error => {
                    console.error("Errore durante la riproduzione:", error);
                });
        }
    </script>
</body>
</html>
